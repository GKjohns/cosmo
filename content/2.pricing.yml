faq:
  title: Frequently asked questions
  description: Common questions about AEGIS deployment, capabilities, and support.
  items:
    - label: What security certifications does AEGIS hold?
      content: AEGIS is built on a zero-trust architecture with end-to-end encryption for all data in transit and at rest. We maintain compliance with all major fleet security frameworks and undergo continuous third-party auditing.
    - label: How quickly can we deploy AEGIS?
      content: Most fleet commands are fully operational within 48 hours. Our deployment team handles integration with your existing sensor arrays and communications infrastructure.
    - label: Can we run AEGIS in air-gapped environments?
      content: Yes. AEGIS supports fully air-gapped deployments with local-only data processing. Edge nodes can operate independently and sync when connectivity is restored.
    - label: Can we upgrade or downgrade our tier?
      content: Tier changes take effect immediately. Upgrades unlock additional capabilities instantly, and downgrades are prorated for the remaining billing period.
    - label: What happens if we exceed our vessel limit?
      content: You'll receive a notification when approaching your tier limit. Additional vessels can be added at a per-unit rate, or you can upgrade to the next tier for better value.
    - label: Do you offer training for command staff?
      content: Every tier includes access to our self-service training modules. Squadron and Fleet tiers include live training sessions with our operations specialists.
